<!DOCTYPE html>
<html lang=pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>PetFriends</title>
</head>
<body>
    <header class="header">
        <div class="logo">
            <img class="pet-friends" src="assets/images/petfriends.png" alt="">
        </div>

        <nav class="navbar">
            <a href="#">Início</a>
            <a href="#">Produtos</a>
            <a href="#">Cuidados</a>
            <a href="#">Serviços</a>
            <a href="#">Sobre</a>
        </nav>

        <div class="header-icons">
            <button class="icon-button">🔍</button>
            <button class="icon-button">🤍</button>
            <button class="icon-button">🛒</button>
            
            <button class="profile-button">👤 Perfil </button>
        </div>
    </header>
    <section class="hero">
        <div class="hero-content">

            <div class="hero-badge">

                <span>🐾 Seu pet, nossa paixão</span>

            </div>

            <h2>
                Todo amor <br>
                do mundo
            </h2>

            <p>
                Aqui você encontra tudo para o bem-estar,
                felicidade e cuidados do seu pet.
            </p>

            <div class="hero-buttons">

                <button class="primary-button">
                    Explorar produtos
                </button>

                <button class="secondary-button">
                    Nossos serviços
                </button>
            </div>

            <div class="hero-ifo">

                <div  class="info-card">
                    <span>🚚</span>
                    <div>
                        <h4>Entrega rápida</h4>
                        <p>Para tofo o Brasil</p>
                    </div>
                </div>

                <div class="info-card">
                    <span>🛡️</span>
                    <div>
                        <h4>Produtos Premium</h4>
                        <p>Alta qualidade</p>
                    </div>
                </div>

                <div class="info-card">
                    <span>🎧</span>
                    <div>
                        <h4>Suporte Especializado</h4>
                        <p>Atendimento humanizado</p>
                    </div>
                </div>

            </div>
        </div>


    </section>
    
</body>
</html>
